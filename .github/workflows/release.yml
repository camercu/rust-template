name: Release

on:
  # Gate on CI: fire only after the CI workflow finishes against
  # `main`, and skip the job body if CI did not conclude with success
  # (see the `if:` on the release-plz job below). Without this gate,
  # a push to `main` triggered ci.yml and release.yml in parallel and
  # release-plz could open the release PR even when canonical-gate
  # was red.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# `release-plz` operates in PR mode: a successful CI run on `main`
# triggers this workflow, which opens or updates a "Release v{version}"
# PR with the bump + CHANGELOG.md entry. When the PR is merged, the
# resulting push fires CI again, and on success this workflow fires
# again, sees the release commit, tags it, and cuts a GitHub Release.

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: release-plz
    # Skip the job body entirely if CI failed/was cancelled. The
    # workflow_run trigger fires regardless of upstream conclusion;
    # the conclusion check is the actual gate.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    steps:
      # Check out `main` (not the head_sha) because release-plz needs
      # a branch context — `git rev-parse @{upstream}` fails on a
      # detached HEAD. The race window between CI greenlighting a
      # commit and release-plz seeing a newer main HEAD is bounded
      # by the concurrency group below, which serializes release runs
      # so a later push will trigger its own gated release.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Parse .tool-versions
        id: tools
        run: |
          while read -r name version; do
            # GitHub output names use underscores; tool names use hyphens.
            echo "${name//-/_}=${version}" >> "$GITHUB_OUTPUT"
          done < <(grep -v '^#' .tool-versions | grep -v '^$')

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.tools.outputs.rust }}

      - uses: Swatinem/rust-cache@v2

      # The action defaults to running `release-pr` followed by
      # `release` in one step, which matches the two phases of the
      # PR-based flow (open/update the PR, then release on merge).
      # CARGO_REGISTRY_TOKEN is exported even though `publish = false`
      # in release-plz.toml so enabling crates.io publish later is a
      # single-key edit there.
      - uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_KEY }}

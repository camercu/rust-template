name: Release

on:
  # Gate on CI: fire only after the CI workflow finishes against
  # `main`, and skip the job body if CI did not conclude with success
  # (see the `if:` on the release job below). Without this gate, a
  # push to `main` triggered ci.yml and release.yml in parallel and
  # semantic-release could cut a release even when canonical-gate was
  # red.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  # `@semantic-release/github`'s `success` step posts comments on
  # issues and PRs closed by the release. Without these scopes the
  # call to the issues API returns "Resource not accessible by
  # integration" and the entire step fails (the release itself has
  # already published at that point).
  issues: write
  pull-requests: write

# Prevent two release runs from racing. `cancel-in-progress: false`
# protects an in-flight release from being killed mid tag-push.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: release
    # Skip the job body entirely if CI failed/was cancelled. The
    # workflow_run trigger fires regardless of upstream conclusion;
    # the conclusion check is the actual gate.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    steps:
      # Check out `main` (not the head_sha) so semantic-release's git
      # plugin commits and pushes against a branch context. The race
      # window between CI greenlighting a commit and this step seeing a
      # newer main HEAD is bounded by the concurrency group above,
      # which serializes release runs so a later push triggers its own
      # gated release.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Parse .tool-versions
        id: tools
        run: |
          while read -r name version; do
            # GitHub output names use underscores; tool names use hyphens.
            echo "${name//-/_}=${version}" >> "$GITHUB_OUTPUT"
          done < <(grep -v '^#' .tool-versions | grep -v '^$')

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.tools.outputs.rust }}

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: npm

      - uses: taiki-e/install-action@v2
        with:
          tool: just@${{ steps.tools.outputs.just }}

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_KEY }}
        run: just release

# release-plz configuration.
# Reference: https://release-plz.dev/docs/config

[workspace]
# Match the `v{version}` tag format. The generated project starts with
# no tags; tag the current `main` HEAD as `v0.1.0` BEFORE the first
# release run (see _README.md's "Releases" section) so the lineage
# anchors at 0.x.y and not at release-plz's first-release default.
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"

# Crates.io publish is intentionally disabled. The release workflow
# already exports CARGO_REGISTRY_TOKEN, so enabling crates.io publish
# is a single-key edit here once a `CRATES_API_KEY` secret is set in
# the `release` GitHub environment.
publish = false

# Update CHANGELOG.md alongside the version bump.
changelog_update = true

# Update inter-crate version requirements in [workspace.dependencies]
# when [workspace.package].version is bumped. Relevant if the project
# grows into a multi-crate workspace later.
dependencies_update = true

# Map Conventional Commit types to changelog sections + bump impact.
# `skip = true` excludes the commit from BOTH the changelog and the
# release decision (e.g., `fix(ci):` should not trigger a release).
[changelog]
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix\\(ci\\)", skip = true },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance Improvements" },
  { message = "^revert", group = "Reverts" },
  { message = "^docs", skip = true },
  { message = "^style", skip = true },
  { message = "^chore", skip = true },
  { message = "^refactor", skip = true },
  { message = "^test", skip = true },
  { message = "^build", skip = true },
  { message = "^ci", skip = true },
]
